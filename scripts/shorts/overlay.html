<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>SWIM CAPSULE — overlay renderer</title>
<style>
@font-face { font-family: 'NanumPen'; src: url('assets/NanumPenScript-Regular.ttf'); }
html,body{margin:0;background:transparent}
canvas{width:270px;height:480px;background:#333}
</style>
</head>
<body>
<canvas id="c" width="1080" height="1920"></canvas>
<span style="font-family:NanumPen;position:absolute;left:-999px">폰트 프리로드</span>
<script>
/* 전광판/손글씨 후합성 오버레이 렌더러 (투명 RGBA 프레임 시퀀스)
   compose.mjs가 initOverlay(config) 후 renderFrame(i)를 호출.
   config.panels[].keys: [{t,x,y,s,a,rot?}] — 전역 초 단위 키프레임, 선형 보간.
   (x,y)=패널 중심(1080x1920 기준), s=배율, a=불투명도. keys 범위 밖에서는 안 그림. */
'use strict';
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const W = 1080, H = 1920;
let CFG = null;

window.initOverlay = async function (config) {
  CFG = config;
  await document.fonts.load('40px NanumPen');
  await document.fonts.ready;
  return true;
};

function trackAt(keys, t) {
  if (t < keys[0].t || t > keys[keys.length - 1].t) return null;
  let i = 0;
  while (i < keys.length - 1 && keys[i + 1].t < t) i++;
  const a = keys[i], b = keys[Math.min(i + 1, keys.length - 1)];
  const k = b.t === a.t ? 0 : (t - a.t) / (b.t - a.t);
  const L = (p, q) => p + (q - p) * k;
  return { x: L(a.x, b.x), y: L(a.y, b.y), s: L(a.s ?? 1, b.s ?? 1), a: L(a.a ?? 1, b.a ?? 1), rot: L(a.rot ?? 0, b.rot ?? 0), skew: L(a.skew ?? 0, b.skew ?? 0) };
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

/* 경기장 광고판(board): 월드컵 피치사이드 LED 디스플레이 —
   자발광 브랜드 컬러 배경 + 흰 볼드 텍스트, 채널 측면을 따라 기울어짐(skew) */
function drawBoard(p, tr) {
  const w = p.w, lineH = p.lineH || 80;
  const h = p.pad * 2 + p.lines.length * lineH;
  const ac = p.accent || '#0b62d6';
  ctx.save();
  ctx.translate(tr.x, tr.y);
  ctx.rotate((tr.rot || 0) * Math.PI / 180);
  ctx.transform(1, tr.skew || 0, 0, 1, 0, 0);   // 측면 원근 기울기
  ctx.scale(tr.s, tr.s);
  ctx.globalAlpha = tr.a;
  // 어두운 베젤(프레임)
  ctx.fillStyle = '#14181c';
  roundRect(-w / 2 - 10, -h / 2 - 10, w + 20, h + 20, 10);
  ctx.fill();
  // 자발광 스크린 (LED 광원이 주변에 번지는 블룸)
  ctx.shadowColor = ac; ctx.shadowBlur = 34;
  const bg = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
  bg.addColorStop(0, shade(ac, 1.25));
  bg.addColorStop(0.5, ac);
  bg.addColorStop(1, shade(ac, 0.72));
  ctx.fillStyle = bg;
  roundRect(-w / 2, -h / 2, w, h, 7);
  ctx.fill();
  ctx.shadowBlur = 0;
  // 텍스트 — 흰색 볼드, 살짝 발광
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  p.lines.forEach((ln, i) => {
    const y = -h / 2 + p.pad + lineH * (i + 0.5);
    ctx.font = `${ln.weight || 900} ${ln.size || 50}px ${ln.font || '"Avenir Next", "Apple SD Gothic Neo", sans-serif'}`;
    ctx.shadowColor = 'rgba(255,255,255,.8)'; ctx.shadowBlur = 10;
    ctx.fillStyle = ln.color || '#ffffff';
    ctx.fillText(ln.text, 0, y, w - p.pad * 1.6);
  });
  ctx.shadowBlur = 0;
  // LED 픽셀 격자 (희미하게)
  ctx.globalAlpha = tr.a * 0.10;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  for (let gy = -h / 2 + 4; gy < h / 2; gy += 6) {
    ctx.beginPath(); ctx.moveTo(-w / 2 + 2, gy); ctx.lineTo(w / 2 - 2, gy); ctx.stroke();
  }
  // 수면·바닥 반사광 힌트 (아래쪽으로 은은한 빛)
  ctx.globalAlpha = tr.a * 0.22;
  const rf = ctx.createLinearGradient(0, h / 2, 0, h / 2 + 46);
  rf.addColorStop(0, ac); rf.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rf;
  ctx.fillRect(-w / 2, h / 2 + 10, w, 46);
  ctx.restore();
}
function shade(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  const c = v => Math.max(0, Math.min(255, Math.round(v * f)));
  return `rgb(${c(n >> 16)},${c((n >> 8) & 255)},${c(n & 255)})`;
}

/* 콘솔 LCD(dash): 라이드 뱃머리에 장착된 계기판 화면 하나 —
   좌우 부유 광고판 대신 화면 중앙 하단에 고정되어 '라이드의 일부'로 읽힌다.
   월드컵 전광판처럼 자발광 스크린 + 헤더 스트립. 위치 고정, tr.a로만 페이드. */
function drawDash(p, tr) {
  const CX = 540, CY = 1372;
  const wB = p.w || 500, wT = wB * 0.8;      // 아래 넓고 위 좁은 원근 사다리꼴
  const lineH = p.lineH || 64, pad = p.pad || 22, hdrH = 44;
  const bodyLines = p.lines.length - 1;       // 0번째 줄 = 헤더 라벨
  const h = pad * 2 + bodyLines * lineH + hdrH;
  const topY = CY - h / 2, botY = CY + h / 2;
  const tl = CX - wT / 2, trr = CX + wT / 2, bl = CX - wB / 2, br = CX + wB / 2;
  const ac = p.accent || '#0b62d6';
  ctx.save();
  ctx.globalAlpha = tr.a;
  // 마운트 지지대 (뱃머리로 연결)
  ctx.fillStyle = '#171c21';
  ctx.fillRect(CX - 74, botY - 4, 24, 96);
  ctx.fillRect(CX + 50, botY - 4, 24, 96);
  // 베젤
  ctx.shadowColor = 'rgba(0,0,0,.5)'; ctx.shadowBlur = 26; ctx.shadowOffsetY = 9;
  ctx.fillStyle = '#0d1115';
  ctx.beginPath();
  ctx.moveTo(tl - 11, topY - 11); ctx.lineTo(trr + 11, topY - 11);
  ctx.lineTo(br + 13, botY + 11); ctx.lineTo(bl - 13, botY + 11); ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  // 스크린 (자발광)
  ctx.beginPath();
  ctx.moveTo(tl, topY); ctx.lineTo(trr, topY); ctx.lineTo(br, botY); ctx.lineTo(bl, botY); ctx.closePath();
  ctx.save(); ctx.clip();
  const g = ctx.createLinearGradient(0, topY, 0, botY);
  g.addColorStop(0, '#0a1a33'); g.addColorStop(1, '#040a15');
  ctx.fillStyle = g; ctx.fillRect(0, topY, W, h);
  ctx.fillStyle = ac; ctx.fillRect(0, topY, W, hdrH);          // 헤더 스트립
  ctx.globalAlpha = tr.a * 0.5; ctx.shadowColor = ac; ctx.shadowBlur = 30; // 스크린 블룸
  ctx.fillStyle = ac; ctx.fillRect(0, topY, W, 3); ctx.shadowBlur = 0;
  ctx.globalAlpha = tr.a * 0.07; ctx.fillStyle = '#7fd0ff';    // 스캔라인
  for (let y = topY + hdrH; y < botY; y += 6) ctx.fillRect(0, y, W, 2);
  ctx.globalAlpha = tr.a;
  ctx.restore();
  // 텍스트
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const maxW = wT * 0.88;
  p.lines.forEach((ln, i) => {
    const y = i === 0 ? topY + hdrH / 2 : topY + hdrH + pad + (i - 0.5) * lineH;
    ctx.font = `${ln.weight || 800} ${ln.size || 46}px ${ln.font || '"Avenir Next", "Apple SD Gothic Neo", sans-serif'}`;
    ctx.shadowColor = i === 0 ? 'rgba(0,0,0,.35)' : (ln.glow || 'rgba(120,210,255,.75)');
    ctx.shadowBlur = i === 0 ? 3 : 11;
    ctx.fillStyle = ln.color || (i === 0 ? '#ffffff' : '#eaf6ff');
    ctx.fillText(ln.text, CX, y, maxW);
  });
  ctx.shadowBlur = 0;
  // 상단 유리 반사
  ctx.globalAlpha = tr.a * 0.12;
  const rg = ctx.createLinearGradient(0, topY, 0, CY);
  rg.addColorStop(0, '#fff'); rg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.moveTo(tl, topY); ctx.lineTo(trr, topY);
  ctx.lineTo(CX + wT * 0.28, CY); ctx.lineTo(CX - wT * 0.28, CY); ctx.closePath();
  ctx.fillStyle = rg; ctx.fill();
  ctx.restore();
}

/* LED 전광판 패널: 검은 스크린 + 발광 텍스트 + 스캔라인 */
function drawLed(p, tr) {
  const w = p.w, lineH = p.lineH || 84;
  const h = p.pad * 2 + p.lines.length * lineH;
  ctx.save();
  ctx.translate(tr.x, tr.y);
  ctx.rotate((tr.rot || 0) * Math.PI / 180);
  ctx.scale(tr.s, tr.s);
  ctx.globalAlpha = tr.a;
  // 스크린 본체 (LED 오프-블랙, 살짝 광택)
  const bg = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
  bg.addColorStop(0, 'rgba(10,12,14,.96)');
  bg.addColorStop(1, 'rgba(16,20,24,.96)');
  ctx.fillStyle = bg;
  roundRect(-w / 2, -h / 2, w, h, 14);
  ctx.fill();
  ctx.strokeStyle = 'rgba(70,80,90,.8)'; ctx.lineWidth = 5; ctx.stroke();
  // 텍스트 (발광)
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  p.lines.forEach((ln, i) => {
    const y = -h / 2 + p.pad + lineH * (i + 0.5);
    ctx.font = `${ln.weight || 800} ${ln.size || 56}px ${ln.font || '"Avenir Next", "Apple SD Gothic Neo", sans-serif'}`;
    ctx.shadowColor = ln.color || '#ffb300';
    ctx.shadowBlur = 26;
    ctx.fillStyle = ln.color || '#ffb300';
    ctx.fillText(ln.text, 0, y, w - p.pad * 1.6);
    ctx.shadowBlur = 0;
  });
  // 스캔라인
  ctx.globalAlpha = tr.a * 0.18;
  ctx.fillStyle = '#000';
  for (let y = -h / 2 + 3; y < h / 2; y += 7) ctx.fillRect(-w / 2 + 4, y, w - 8, 2.6);
  ctx.restore();
}

/* 손글씨 쪽지: 종이 + 테이프 + 나눔펜 */
function drawNote(p, tr) {
  const w = p.w, lineH = p.lineH || 74;
  const h = p.pad * 2 + p.lines.length * lineH + (p.date ? 54 : 0);
  ctx.save();
  ctx.translate(tr.x, tr.y);
  ctx.rotate(((tr.rot ?? 0) - 2.2) * Math.PI / 180);
  ctx.scale(tr.s, tr.s);
  ctx.globalAlpha = tr.a;
  ctx.shadowColor = 'rgba(0,0,0,.5)'; ctx.shadowBlur = 30; ctx.shadowOffsetY = 10;
  const paper = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
  paper.addColorStop(0, '#fdf9ec');
  paper.addColorStop(1, '#f3ecd7');
  ctx.fillStyle = paper;
  roundRect(-w / 2, -h / 2, w, h, 8);
  ctx.fill();
  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  // 테이프
  ctx.fillStyle = 'rgba(255,244,190,.85)';
  ctx.save(); ctx.rotate(-0.06); ctx.fillRect(-90, -h / 2 - 26, 180, 52); ctx.restore();
  // 본문
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#2b3348';
  p.lines.forEach((ln, i) => {
    ctx.font = `${ln.size || 58}px NanumPen, "Apple SD Gothic Neo"`;
    ctx.fillText(ln.text, 0, -h / 2 + p.pad + lineH * (i + 0.5), w - p.pad * 1.4);
  });
  if (p.date) {
    ctx.font = '44px NanumPen';
    ctx.fillStyle = '#8a7f63';
    ctx.textAlign = 'right';
    ctx.fillText(p.date, w / 2 - p.pad, h / 2 - p.pad * 0.7);
  }
  ctx.restore();
}

window.renderFrame = function (frame) {
  const t = frame / CFG.fps;
  ctx.clearRect(0, 0, W, H);
  for (const p of CFG.panels) {
    const tr = trackAt(p.keys, t);
    if (!tr || tr.a <= 0.01) continue;
    p.pad = p.pad || 34;
    if (p.type === 'note') drawNote(p, tr);
    else if (p.type === 'dash') drawDash(p, tr);
    else if (p.type === 'board') drawBoard(p, tr);
    else drawLed(p, tr);
  }
  return cv.toDataURL('image/png');
};
</script>
</body>
</html>
