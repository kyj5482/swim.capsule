name: Build & Deploy Capsule Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build static site
        run: node scripts/build.mjs
        env:
          SITE_BASE: https://kyj5482.github.io/swim.capsule
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 저장소에서 Pages가 아직 활성화되지 않았으면 활성화 시도
      # (토큰 권한 부족으로 실패하면 Settings → Pages → Source: GitHub Actions 수동 설정 필요)
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - id: deployment
        uses: actions/deploy-pages@v4
